[default]
description = "Default permissions for the mobile-push plugin"
permissions = [
  "allow-request-permission",
  "allow-get-token",
  "allow-register-listener"
]

[[permission]]
identifier = "allow-request-permission"
description = "Allows requesting push notification permission"
commands.allow = ["request_permission"]

[[permission]]
identifier = "allow-get-token"
description = "Allows retrieving the push notification device token"
commands.allow = ["get_token"]

[[permission]]
identifier = "allow-register-listener"
description = "Allows registering event listeners for push notification events"
commands.allow = ["register_listener"]
